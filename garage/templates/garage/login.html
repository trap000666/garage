<!-- garage/templates/garage/login.html -->
{% extends 'garage/base.html' %}
{% block title %}Staff Login{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="card p-4">
      <h4 class="mb-4 text-center"><i class="bi bi-lock-fill text-warning"></i> Staff Login</h4>
      <form method="post">
        {% csrf_token %}
        {% for field in form %}
          <div class="mb-3">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
          </div>
        {% endfor %}
        <button type="submit" class="btn btn-warning w-100">Login</button>
      </form>
    </div>
  </div>
</div>
<style>
  input { display: block; width: 100%; padding: .375rem .75rem;
    border: 1px solid #ced4da; border-radius: .375rem; font-size: 1rem; }
</style>
{% endblock %}
