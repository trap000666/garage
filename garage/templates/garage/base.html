<!-- garage/templates/garage/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}GarageFlow{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .navbar-brand { font-weight: bold; font-size: 1.5rem; }
    .card { border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .badge-pending { background-color: #ffc107; color: #000; }
    .badge-confirmed { background-color: #0d6efd; }
    .badge-in_progress { background-color: #fd7e14; }
    .badge-completed { background-color: #198754; }
    .badge-cancelled { background-color: #dc3545; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand text-warning" href="{% url 'home' %}">
      <i class="bi bi-gear-fill"></i> GarageFlow
    </a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link text-white" href="{% url 'book_service' %}">Book Service</a>
      {% if user.is_authenticated %}
        <a class="nav-link text-white" href="{% url 'dashboard' %}">Dashboard</a>
        <a class="nav-link text-warning" href="{% url 'logout' %}">Logout</a>
      {% else %}
        <a class="nav-link text-white" href="{% url 'login' %}">Staff Login</a>
      {% endif %}
    </div>
  </div>
</nav>

<div class="container mt-4">
  {% if messages %}
    {% for msg in messages %}
      <div class="alert alert-{{ msg.tags }} alert-dismissible fade show">
        {{ msg }} <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endif %}
  {% block content %}{% endblock %}
</div>

<footer class="text-center text-muted py-4 mt-5">
  <small>&copy; 2025 GarageFlow. All rights reserved.</small>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
